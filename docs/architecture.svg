<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 660" font-family="'Segoe UI', 'Helvetica Neue', Arial, 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0d9488"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="980" height="660" fill="#f8fafc"/>

  <!-- Header -->
  <rect x="20" y="18" width="940" height="50" rx="10" fill="#0f172a"/>
  <text x="40" y="49" fill="#f8fafc" font-size="21" font-weight="700">api-forge</text>
  <text x="940" y="48" fill="#94a3b8" font-size="13" text-anchor="end">메타데이터 기반 No-Code 동적 Open API 생성 · Spring Boot 3 / jOOQ</text>

  <!-- Layer labels (gutter) -->
  <g font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">
    <text x="54" y="122">CLIENT</text>
    <text x="54" y="212">WEB</text>
    <text x="54" y="310">SERVICE</text>
    <text x="54" y="410">CORE</text>
    <text x="54" y="514">DATA</text>
  </g>

  <!-- Column headers -->
  <text x="305" y="90" fill="#475569" font-size="13" font-weight="700" text-anchor="middle">① 쓰기 · 관리 흐름</text>
  <text x="730" y="90" fill="#475569" font-size="13" font-weight="700" text-anchor="middle">② 읽기 · 질의 흐름</text>

  <!-- ============ Arrows (drawn under boxes) ============ -->
  <g stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <!-- left column -->
    <line x1="305" y1="148" x2="305" y2="180"/>
    <line x1="305" y1="240" x2="305" y2="278"/>
    <line x1="305" y1="338" x2="305" y2="478"/>
    <!-- right column -->
    <line x1="730" y1="148" x2="730" y2="180"/>
    <line x1="730" y1="240" x2="730" y2="278"/>
    <line x1="700" y1="338" x2="648" y2="376"/>
    <line x1="760" y1="338" x2="812" y2="376"/>
    <line x1="641" y1="440" x2="712" y2="478"/>
  </g>
  <!-- dashed: metadata reference (data -> service) -->
  <path d="M 470 496 C 520 470, 545 400, 560 338" stroke="#0d9488" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#arrowDash)"/>
  <text x="512" y="466" fill="#0d9488" font-size="11" font-weight="600" text-anchor="middle">메타데이터 참조</text>

  <!-- arrow labels -->
  <text x="316" y="415" fill="#64748b" font-size="10.5" text-anchor="start">등록·발행</text>

  <!-- ============ CLIENT ============ -->
  <g filter="url(#shadow)">
    <rect x="140" y="96" width="330" height="52" rx="9" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <rect x="560" y="96" width="340" height="52" rx="9" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  </g>
  <text x="305" y="118" fill="#0c4a6e" font-size="15" font-weight="700" text-anchor="middle">관리자 · Admin</text>
  <text x="305" y="136" fill="#0369a1" font-size="11.5" text-anchor="middle">데이터셋 등록 · 발행</text>
  <text x="730" y="118" fill="#0c4a6e" font-size="15" font-weight="700" text-anchor="middle">API 사용자 · Consumer</text>
  <text x="730" y="136" fill="#0369a1" font-size="11.5" text-anchor="middle">필터 · 정렬 · 페이징 · 포맷 질의</text>

  <!-- ============ WEB ============ -->
  <g filter="url(#shadow)">
    <rect x="140" y="182" width="330" height="58" rx="9" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="560" y="182" width="340" height="58" rx="9" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  </g>
  <text x="305" y="206" fill="#3730a3" font-size="14.5" font-weight="700" text-anchor="middle">AdminDatasetController</text>
  <text x="305" y="225" fill="#4338ca" font-size="11" text-anchor="middle">POST /admin/api/datasets · /publish</text>
  <text x="730" y="206" fill="#3730a3" font-size="14.5" font-weight="700" text-anchor="middle">OpenApiController</text>
  <text x="730" y="225" fill="#4338ca" font-size="11" text-anchor="middle">GET /api/v1/datasets/{key}</text>

  <!-- ============ SERVICE ============ -->
  <g filter="url(#shadow)">
    <rect x="140" y="280" width="330" height="58" rx="9" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="560" y="280" width="340" height="58" rx="9" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <text x="305" y="304" fill="#5b21b6" font-size="14.5" font-weight="700" text-anchor="middle">DatasetAdminService</text>
  <text x="305" y="323" fill="#6d28d9" font-size="11" text-anchor="middle">식별자 검증 · 발행 전 실존 프로브</text>
  <text x="730" y="304" fill="#5b21b6" font-size="14.5" font-weight="700" text-anchor="middle">DataQueryService</text>
  <text x="730" y="323" fill="#6d28d9" font-size="11" text-anchor="middle">메타데이터 로드 · 질의 조립</text>

  <!-- ============ CORE ============ -->
  <g filter="url(#shadow)">
    <rect x="560" y="378" width="162" height="62" rx="9" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
    <rect x="730" y="378" width="170" height="62" rx="9" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  </g>
  <text x="641" y="399" fill="#9d174d" font-size="12.5" font-weight="700" text-anchor="middle">🔒 DynamicQueryBuilder</text>
  <text x="641" y="416" fill="#be185d" font-size="10" text-anchor="middle">jOOQ · 칼럼 화이트리스트</text>
  <text x="641" y="429" fill="#be185d" font-size="10" text-anchor="middle">+ 값 바인드 파라미터</text>
  <text x="815" y="399" fill="#9d174d" font-size="12.5" font-weight="700" text-anchor="middle">ResponseWriterResolver</text>
  <text x="815" y="416" fill="#be185d" font-size="10" text-anchor="middle">JSON · CSV · XML</text>
  <text x="815" y="429" fill="#be185d" font-size="10" text-anchor="middle">전략 빈 자동 수집</text>

  <!-- ============ DATA ============ -->
  <g filter="url(#shadow)">
    <rect x="140" y="480" width="330" height="60" rx="9" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
    <rect x="560" y="480" width="340" height="60" rx="9" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  </g>
  <text x="305" y="505" fill="#115e59" font-size="14.5" font-weight="700" text-anchor="middle">메타데이터 저장소</text>
  <text x="305" y="524" fill="#0f766e" font-size="11" text-anchor="middle">DATASET · DATASET_COLUMN (JPA)</text>
  <text x="730" y="505" fill="#115e59" font-size="14.5" font-weight="700" text-anchor="middle">소스 테이블</text>
  <text x="730" y="524" fill="#0f766e" font-size="11" text-anchor="middle">동적 조회 대상 (jOOQ)</text>

  <!-- ============ Legend ============ -->
  <g transform="translate(140, 578)" font-size="11.5" fill="#475569">
    <line x1="0" y1="8" x2="34" y2="8" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="42" y="12">요청 흐름</text>

    <line x1="150" y1="8" x2="184" y2="8" stroke="#0d9488" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowDash)"/>
    <text x="192" y="12">메타데이터 참조</text>

    <rect x="330" y="0" width="16" height="16" rx="3" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
    <text x="354" y="12">🔒 SQL Injection 차단 지점 (화이트리스트 + 바인드 파라미터)</text>
  </g>
</svg>
